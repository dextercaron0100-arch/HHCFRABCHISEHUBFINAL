<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Store Locator</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --brand-yellow: #F5C300;
    --brand-yellow-light: #FFF8D6;
    --brand-yellow-mid: #FDEEA0;
    --brand-blue: #0A4FA6;
    --brand-blue-light: #1A6FD4;
    --text-dark: #0D1B2A;
    --text-mid: #4A5568;
    --text-light: #8A95A3;
    --border: #E2E8F0;
    --bg: #F7F9FC;
    --white: #FFFFFF;
    --radius: 14px;
    --shadow-sm: 0 2px 8px rgba(10,79,166,0.07);
    --shadow-md: 0 6px 24px rgba(10,79,166,0.12);
    --shadow-lg: 0 16px 48px rgba(10,79,166,0.16);
    --transition: 0.22s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 48px 24px;
  }

  .page-header {
    max-width: 1160px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .page-title-block h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(28px, 4vw, 40px);
    font-weight: 700;
    color: var(--text-dark);
    letter-spacing: -0.5px;
    line-height: 1.15;
  }

  .page-title-block p {
    margin-top: 6px;
    font-size: 14px;
    color: var(--text-light);
    font-weight: 400;
    letter-spacing: 0.2px;
  }

  .store-count-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--brand-yellow);
    color: var(--text-dark);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 40px;
    letter-spacing: 0.2px;
    white-space: nowrap;
    box-shadow: 0 2px 12px rgba(245,195,0,0.35);
  }

  .store-count-badge .dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--brand-blue);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }

  .locator-wrapper {
    max-width: 1160px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 0;
    background: var(--white);
    border-radius: 20px;
    box-shadow: var(--shadow-lg);
    overflow: hidden;
    min-height: 680px;
    border: 1px solid var(--border);
  }

  .left-panel {
    display: flex;
    flex-direction: column;
    background: var(--white);
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .search-section {
    padding: 28px 24px 20px;
    background: linear-gradient(145deg, #0A4FA6 0%, #1A6FD4 100%);
    position: relative;
    overflow: hidden;
  }

  .search-section::before {
    content: '';
    position: absolute;
    top: -40px;
    right: -40px;
    width: 180px;
    height: 180px;
    border-radius: 50%;
    background: rgba(245,195,0,0.12);
    pointer-events: none;
  }

  .search-section::after {
    content: '';
    position: absolute;
    bottom: -60px;
    left: -30px;
    width: 140px;
    height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }

  .search-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 12px;
  }

  .search-box {
    position: relative;
    z-index: 1;
  }

  .search-box svg {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-light);
    pointer-events: none;
  }

  .search-box input {
    width: 100%;
    padding: 13px 14px 13px 44px;
    border-radius: 10px;
    border: none;
    background: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-dark);
    outline: none;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    transition: box-shadow var(--transition);
  }

  .search-box input::placeholder { color: var(--text-light); }

  .search-box input:focus {
    box-shadow: 0 4px 20px rgba(0,0,0,0.25), 0 0 0 3px rgba(245,195,0,0.5);
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 14px;
    position: relative;
    z-index: 1;
  }

  .toggle-label {
    font-size: 13px;
    color: rgba(255,255,255,0.85);
    font-weight: 500;
    cursor: pointer;
    user-select: none;
  }

  .toggle-switch {
    position: relative;
    width: 40px;
    height: 22px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .toggle-track {
    position: absolute;
    inset: 0;
    border-radius: 22px;
    background: rgba(255,255,255,0.25);
    transition: background var(--transition);
  }

  .toggle-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: var(--white);
    transition: transform var(--transition);
    box-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }

  .toggle-switch input:checked ~ .toggle-track { background: var(--brand-yellow); }
  .toggle-switch input:checked ~ .toggle-thumb { transform: translateX(18px); background: var(--text-dark); }

  .filter-bar {
    padding: 16px 24px 12px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    border-bottom: 1px solid var(--border);
  }

  .pill {
    font-size: 12px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 30px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text-mid);
    cursor: pointer;
    transition: all var(--transition);
    white-space: nowrap;
  }

  .pill:hover, .pill.active {
    background: var(--brand-blue);
    border-color: var(--brand-blue);
    color: var(--white);
  }

  .pill.active { box-shadow: 0 2px 10px rgba(10,79,166,0.3); }

  .list-header {
    padding: 18px 24px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .list-header-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--text-light);
  }

  .list-header-count {
    font-size: 12px;
    color: var(--brand-blue);
    font-weight: 600;
  }

  .store-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .store-list::-webkit-scrollbar { width: 4px; }
  .store-list::-webkit-scrollbar-track { background: transparent; }
  .store-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .store-card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all var(--transition);
    display: flex;
    gap: 14px;
    align-items: flex-start;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .store-card:nth-child(1) { animation-delay: 0.05s; }
  .store-card:nth-child(2) { animation-delay: 0.1s; }
  .store-card:nth-child(3) { animation-delay: 0.15s; }
  .store-card:nth-child(4) { animation-delay: 0.2s; }
  .store-card:nth-child(5) { animation-delay: 0.25s; }

  .store-card:hover {
    border-color: var(--brand-blue);
    box-shadow: var(--shadow-md);
    transform: translateX(3px);
  }

  .store-card.active {
    border-color: var(--brand-blue);
    background: linear-gradient(135deg, rgba(10,79,166,0.04) 0%, rgba(26,111,212,0.02) 100%);
    box-shadow: var(--shadow-md);
  }

  .store-card.active .store-name { color: var(--brand-blue); }

  .store-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    background: var(--brand-yellow);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    font-size: 18px;
    box-shadow: 0 2px 8px rgba(245,195,0,0.4);
  }

  .store-info { flex: 1; min-width: 0; }

  .store-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-dark);
    letter-spacing: 0.1px;
    margin-bottom: 5px;
    line-height: 1.3;
  }

  .store-address {
    font-size: 12px;
    color: var(--text-light);
    line-height: 1.55;
    font-weight: 400;
  }

  .store-tags {
    display: flex;
    gap: 5px;
    margin-top: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 10px;
    font-weight: 600;
    padding: 3px 8px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }

  .tag-open { background: #DCFCE7; color: #166534; }
  .tag-brand { background: #DBEAFE; color: #1D4ED8; }
  .tag-city { background: var(--brand-yellow-light); color: #7A5200; }
  .tag-new { background: #EEF2FF; color: var(--brand-blue); }

  .card-arrow {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-light);
    flex-shrink: 0;
    transition: all var(--transition);
  }

  .store-card:hover .card-arrow {
    background: var(--brand-blue);
    color: var(--white);
  }

  .map-panel {
    position: relative;
    background: #E8EEF4;
  }

  #map { width: 100%; height: 100%; min-height: 680px; }

  .map-overlay {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    display: flex;
    flex-direction: column;
    gap: 8px;
    display: none;
  }

  .map-ctrl-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--text-mid);
    font-size: 18px;
    font-weight: 300;
    transition: all var(--transition);
    line-height: 1;
  }

  .map-ctrl-btn:hover {
    background: var(--brand-blue);
    color: var(--white);
    border-color: var(--brand-blue);
  }

  .map-info-card {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    background: #f1f3f5;
    border-radius: 14px;
    padding: 18px 18px 16px;
    box-shadow: 0 12px 30px rgba(15, 23, 42, 0.22);
    border: 1px solid rgba(148, 163, 184, 0.26);
    width: min(340px, calc(100% - 48px));
    display: none;
    animation: slideUp 0.3s ease;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translate(-50%, -10px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  .map-info-card.visible { display: block; }

  .map-info-name {
    font-size: 30px;
    font-weight: 700;
    color: #0a67ab;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    line-height: 1.14;
    margin-bottom: 12px;
    max-width: calc(100% - 26px);
    white-space: pre-line;
  }

  .map-info-addr {
    font-size: 30px;
    font-weight: 700;
    color: #141414;
    text-transform: uppercase;
    line-height: 1.22;
    margin-bottom: 10px;
  }

  .map-info-zip {
    font-size: 22px;
    font-weight: 700;
    color: #1f2937;
    line-height: 1.2;
  }

  .map-info-close {
    position: absolute;
    top: 7px;
    right: 7px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: transparent;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #b4b8bc;
    font-size: 19px;
    line-height: 1;
    transition: color var(--transition), background var(--transition);
  }

  .map-info-close:hover {
    color: #6b7280;
    background: rgba(15, 23, 42, 0.05);
  }

  .leaflet-container { font-family: 'DM Sans', sans-serif; }
  .leaflet-top.leaflet-left { margin-top: 10px; margin-left: 10px; }
  .leaflet-control-zoom {
    display: block !important;
    border: 1px solid #cbd5e1 !important;
    box-shadow: 0 2px 10px rgba(15, 23, 42, 0.18);
  }
  .leaflet-control-zoom a {
    width: 30px;
    height: 30px;
    line-height: 30px;
    font-size: 20px;
    color: #111827 !important;
  }
  .leaflet-control-zoom a:hover {
    background: #f3f4f6;
  }

  @media (max-width: 860px) {
    .locator-wrapper {
      grid-template-columns: 1fr;
      grid-template-rows: auto 420px;
    }

    .left-panel {
      border-right: none;
      border-bottom: 1px solid var(--border);
      max-height: 480px;
    }

    #map { min-height: 420px; }

    .map-info-card { top: 16px; }
    .map-info-name { font-size: clamp(15px, 4.8vw, 21px); }
    .map-info-addr { font-size: clamp(14px, 4.4vw, 20px); }
    .map-info-zip { font-size: clamp(13px, 3.6vw, 17px); }
  }
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title-block">
    <h1>Store Locator</h1>
    <p>Find the nearest HHC partner store in your area</p>
  </div>
  <div class="store-count-badge">
    <span class="dot"></span>
    <span id="storeNationwideCount">0</span> Stores Nationwide
  </div>
</div>

<div class="locator-wrapper">
  <div class="left-panel">
    <div class="search-section">
      <div class="search-label">Find a Branch</div>
      <div class="search-box">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
        <input type="text" id="searchInput" placeholder="Search store name or location..." oninput="filterStores()" />
      </div>
      <div class="toggle-row">
        <label class="toggle-switch">
          <input type="checkbox" id="provinceToggle" onchange="toggleProvinceSearch()" />
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
        <span class="toggle-label" onclick="document.getElementById('provinceToggle').click()">Search by Province and City</span>
      </div>
    </div>

    <div class="filter-bar">
      <span class="pill active" onclick="setFilter(this,'All')">All</span>
      <span class="pill" onclick="setFilter(this,'Bigstop')">Bigstop</span>
      <span class="pill" onclick="setFilter(this,'Boss Siomai')">Boss Siomai</span>
      <span class="pill" onclick="setFilter(this,'Herrera Pharmacy')">Herrera Pharmacy</span>
      <span class="pill" onclick="setFilter(this,'Laguna')">Laguna</span>
      <span class="pill" onclick="setFilter(this,'Bataan')">Bataan</span>
      <span class="pill" onclick="setFilter(this,'Cagayan Valley')">Cagayan Valley</span>
    </div>

    <div class="list-header">
      <span class="list-header-title">Available Stores</span>
      <span class="list-header-count" id="storeCount">0 results</span>
    </div>

    <div class="store-list" id="storeList"></div>
  </div>

  <div class="map-panel">
    <div id="map"></div>

    <div class="map-overlay">
      <button class="map-ctrl-btn" type="button" onclick="map.zoomIn()" aria-label="Zoom in">+</button>
      <button class="map-ctrl-btn" type="button" onclick="map.zoomOut()" aria-label="Zoom out">-</button>
    </div>

    <div class="map-info-card" id="mapInfoCard">
      <button class="map-info-close" type="button" onclick="closeInfoCard()" aria-label="Close">&times;</button>
      <div class="map-info-name" id="infoName"></div>
      <div class="map-info-addr" id="infoAddr"></div>
      <div class="map-info-zip" id="infoZip"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  const initialCenter = [12.5, 122.0];
  const initialZoom = 6;

  map = L.map('map', { zoomControl: true }).setView(initialCenter, initialZoom);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors © CARTO',
    maxZoom: 19
  }).addTo(map);

  function getBrandBadge(brand) {
    if (brand === 'Bigstop') return 'BS';
    if (brand === 'Boss Siomai') return 'SI';
    if (brand === 'Herrera Pharmacy') return 'HP';
    return 'HHC';
  }

  function createMarkerIcon(store, active) {
    const size = active ? 34 : 28;
    const badge = getBrandBadge(store.brand);
    return L.divIcon({
      className: '',
      html: `<div style="
        width:${size}px;
        height:${size}px;
        border-radius:50%;
        background:#0A6FB8;
        border:3px solid #F5C300;
        box-shadow:0 4px 14px rgba(0,0,0,${active ? '0.3' : '0.2'});
        display:flex;align-items:center;justify-content:center;
        transition:all 0.2s;
      "><div style="font-size:${active ? 10 : 9}px;line-height:1;font-weight:700;color:#fff;letter-spacing:0.2px;">${badge}</div></div>`,
      iconSize: [size, size],
      iconAnchor: [size / 2, size / 2],
    });
  }

  function getFilteredStores() {
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    const searchByProvinceCity = document.getElementById('provinceToggle').checked;

    return stores.filter((s) => {
      const matchFilter =
        activeFilter === 'All' ||
        s.brand === activeFilter ||
        s.province === activeFilter ||
        s.city === activeFilter;
      let matchSearch = true;
      if (q) {
        if (searchByProvinceCity) {
          matchSearch = s.province.toLowerCase().includes(q) || s.city.toLowerCase().includes(q) || s.brand.toLowerCase().includes(q);
        } else {
          matchSearch =
            s.name.toLowerCase().includes(q) ||
            s.address.toLowerCase().includes(q) ||
            s.city.toLowerCase().includes(q) ||
            s.brand.toLowerCase().includes(q);
        }
      }
      return matchFilter && matchSearch;
    });
  }

  function renderStores() {
    const list = document.getElementById('storeList');
    const filtered = getFilteredStores();

    list.innerHTML = '';
    markers.forEach((m) => map.removeLayer(m));
    markers = [];

    document.getElementById('storeCount').textContent = `${filtered.length} result${filtered.length !== 1 ? 's' : ''}`;

    filtered.forEach((s, i) => {
      const isActive = s.id === activeStoreId;

      const card = document.createElement('div');
      card.className = `store-card${isActive ? ' active' : ''}`;
      card.style.animationDelay = `${i * 0.05}s`;
      card.innerHTML = `
        <div class="store-icon">&#127970;</div>
        <div class="store-info">
          <div class="store-name">${s.name}</div>
          <div class="store-address">${s.address}</div>
          <div class="store-tags">
            <span class="tag ${s.open ? 'tag-open' : ''}" style="${!s.open ? 'background:#FEE2E2;color:#991B1B;' : ''}">${s.open ? 'Open' : 'Closed'}</span>
            <span class="tag tag-brand">${s.brand}</span>
            <span class="tag tag-city">${s.city}</span>
            <span class="tag tag-city">${s.province}</span>
          </div>
        </div>
        <div class="card-arrow">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="m9 18 6-6-6-6"/>
          </svg>
        </div>`;
      card.onclick = () => selectStore(s);
      list.appendChild(card);

      const marker = L.marker([s.lat, s.lng], { icon: createMarkerIcon(s, isActive) })
        .addTo(map)
        .on('click', () => selectStore(s));
      markers.push(marker);
    });
  }

  function selectStore(s) {
    activeStoreId = s.id;
    renderStores();
    map.flyTo([s.lat, s.lng], 14, { duration: 1.2 });

    document.getElementById('infoName').textContent = `${s.name}\n${s.province}`;
    document.getElementById('infoAddr').textContent = s.address;
    document.getElementById('infoZip').textContent = `Zip code: ${s.zip || '-'}`;
    document.getElementById('mapInfoCard').classList.add('visible');

    setTimeout(() => {
      const cards = document.querySelectorAll('.store-card');
      const idx = Array.from(cards).findIndex((c) => c.querySelector('.store-name').textContent === s.name);
      if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 100);
  }

  function closeInfoCard() {
    document.getElementById('mapInfoCard').classList.remove('visible');
  }

  function filterStores() {
    activeStoreId = null;
    closeInfoCard();
    renderStores();
  }

  function setFilter(el, filter) {
    document.querySelectorAll('.pill').forEach((p) => p.classList.remove('active'));
    el.classList.add('active');
    activeFilter = filter;
    activeStoreId = null;
    closeInfoCard();
    renderStores();
    map.setView(initialCenter, initialZoom);
  }

  function toggleProvinceSearch() {
    const toggle = document.getElementById('provinceToggle');
    const input = document.getElementById('searchInput');
    input.placeholder = toggle.checked ? 'Search by province, city, or brand...' : 'Search store name or location...';
    filterStores();
  }

  document.getElementById('storeNationwideCount').textContent = stores.length;
  renderStores();
</script>
</body>
</html>
